{% extends "base_public.html" %}

{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<div class="login-page-wrapper">
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-body">

                <h4 class="text-center mb-4">Mot de passe oublié</h4>

                <form method="POST">
                    <!-- ✅ CSRF TOKEN -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
                    <input type="email" name="email" class="form-control mb-3" placeholder="Entrez l'adresse e-mail du compte à récupérer" required>

                    <button class="btn btn-primary w-100">
                        Envoyer le lien
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
