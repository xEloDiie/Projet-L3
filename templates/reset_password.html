{% extends "base_public.html" %}

{% block title %}Réinitialisation du mot de passe{% endblock %}

{% block content %}
<div class="login-page-wrapper">
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-body">

                <h4 class="text-center mb-4">Nouveau mot de passe</h4>

                <form method="POST">
                    <!-- ✅ CSRF TOKEN -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-4">
                        <div class="input-group mb-3">
                            <input type="password" id="password" name="password" class="form-control" placeholder="Entrez votre nouveau mot de passe" maxlength="64" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">👁️</button>
                        </div>
                        
                        <!-- Message force -->
                        <small id="passwordHelp" class="text-alerte">
                            8 caractères min, majuscule, minuscule, chiffre, symbole
                        </small>
                    </div>

                    <button class="btn btn-primary w-100">
                        Modifier le mot de passe
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- JS personnalisé -->
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<!-- Appel fonctions JS -->
<script>
    initPasswordStrength("password", "passwordHelp");
    document.getElementById("togglePassword").addEventListener("click", () => {
        togglePassword("password");
    });
</script>
{% endblock %}
